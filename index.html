<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nurse Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="filter-buttons">
    <button onclick="displayRequests(requests)">All Request</button>
    <button onclick="filterByStatus('Pending')">Pending</button>
    <button onclick="filterByStatus('In Progress')">In progress</button>
    <button onclick="filterByStatus('Completed')">All Completed</button>
    <button onclick="filterByPriority('High')">High Priority</button>
    <button onclick="filterByPriority('Medium')">Medium Priority</button>
    <button onclick="filterByPriority('Low')">Low Priority</button>


  </div>

  <div class="container">
    <h1>Nurse Request Dashboard</h1>

    <div class="search-box">
      <input 
        type="text" 
        id="patientSearch" 
        placeholder="Search by patient name"
      />
      <button onclick="filterByPatient()">Search</button>
    </div>

    <div id="requestList"></div>
  </div>

  <script src="nurse.js"></script>
</body>
</html>
